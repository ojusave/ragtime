databases:
  - name: ragtime-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: ragtime-web
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: node apps/web/dist/server/index.js
    healthCheckPath: /healthz
    preDeployCommand: pnpm db:migrate
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ragtime-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: OPENROUTER_APP_TITLE
        value: RAGtime
      - key: WORKFLOW_SLUG
        value: ragtime-workflows
      - key: MAX_RUN_BUDGET_USD
        value: "5"
      - key: EMBED_BATCH_SIZE
        value: "64"
      - key: CHAOS_FAILURE_RATE
        value: "0"
      - key: NODE_VERSION
        value: "20"
